name: Build WeChatTTS Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v3

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Build
        run: |
          make clean
          make package

      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: WeChatTTS
          path: |
            packages/*.deb
            .theos/obj/WeChatTTS.dylib
