name: Build WeChatTTS Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool libssl-dev

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Build Tweak
        run: |
          make clean
          make package

      - name: Upload Files
        uses: actions/upload-artifact@v3
        with:
          name: WeChatTTS_Final
          path: |
            packages/*.deb
            .theos/obj/WeChatTTS.dylib
