name: Build WeChatTTS Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: |
          brew install dpkg ldid

      - name: Build Tweak
        run: |
          cd $GITHUB_WORKSPACE
          make clean
          make package

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: WeChatTTS_Output
          path: |
            packages/*.deb
            .theos/obj/debug/WeChatTTS.dylib
            WeChatTTS.plist
