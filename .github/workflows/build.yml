name: Build WeChatTTS Tweak

# 强制Node.js 24环境，彻底解决弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang git libtool libssl-dev

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Build Tweak
        run: |
          # 强制进入工作目录，解决路径错误
          cd $GITHUB_WORKSPACE
          make clean
          make package

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WeChatTTS_Result
          path: |
            packages/*.deb
            .theos/obj/debug/WeChatTTS.dylib
            WeChatTTS.plist
