name: Build WeChatTTS

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest  # 使用 macOS 服务器编译，最稳定
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          export THEOS=~/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Setup SDK
        run: |
          mkdir -p $THEOS/sdks
          curl -L https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz -o $THEOS/sdks/iPhoneOS14.5.sdk.tar.xz
          tar -xJf $THEOS/sdks/iPhoneOS14.5.sdk.tar.xz -C $THEOS/sdks

      - name: Build Tweak
        run: |
          make package FINALPACKAGE=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeChatTTS-Plugin
          path: packages/*.deb
