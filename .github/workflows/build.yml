name: Build WeChatTTS Tweak

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang git libtool libssl-dev wget unzip

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Install iOS SDK (关键！解决SDK缺失报错)
        run: |
          # 创建SDK目录
          mkdir -p $HOME/theos/sdks
          # 下载iOS 15 SDK（适配你的Makefile）
          wget https://github.com/theos/sdks/raw/main/iPhoneOS15.0.sdk.zip -O $HOME/theos/sdks/iPhoneOS15.0.sdk.zip
          # 解压SDK
          unzip -q $HOME/theos/sdks/iPhoneOS15.0.sdk.zip -d $HOME/theos/sdks/
          # 删除压缩包
          rm $HOME/theos/sdks/iPhoneOS15.0.sdk.zip

      - name: Build Tweak
        run: |
          cd $GITHUB_WORKSPACE
          make clean
          make package

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WeChatTTS_Result
          path: |
            packages/*.deb
            .theos/obj/debug/WeChatTTS.dylib
            WeChatTTS.plist
