name: Build WeChatTTS Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y clang git libtool libssl-dev

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Build Tweak
        run: |
          make clean
          make package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeChatTTS_Result
          path: |
            packages/*.deb
            .theos/obj/WeChatTTS.dylib
